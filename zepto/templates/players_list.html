<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Players List</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #2ecc71;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            background: #3498db;
            padding: 8px 14px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .back-link:hover {
            background: #2980b9;
        }

        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #2c3e50;
            color: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
        }

        th {
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid #ddd;
            transition: 0.2s;
        }

        tbody tr:hover {
            background: #f1f1f1;
        }

        img {
            border-radius: 6px;
        }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-update {
            background: #27ae60;
            color: white;
        }

        .btn-update:hover {
            background: #1e8449;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .player-link {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        .player-link:hover {
            text-decoration: underline;
        }

        .no-logo {
            color: gray;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            th, td {
                padding: 8px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<h2>🏏 Players List</h2>

<a href="{% url 'franchise_lists' %}" class="back-link">⬅ Back</a>

<div class="table-container">
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Country</th>
            <th>Age</th>
            <th>Role</th>
            <th>Nationality</th>
            <th>Franchise</th>
            <th>Logo</th>
            <th>Update</th>
            <th>Delete</th>
        </tr>
    </thead>

    <tbody>
        {% for k in players %}
        <tr>
            <td>
                <a href="{% url 'franchise_data' k.id %}" class="player-link">
                    {{ k.name }}
                </a>
            </td>
            <td>{{ k.country }}</td>
            <td>{{ k.age }}</td>
            <td>{{ k.role }}</td>
            <td>{{ k.nationality }}</td>
            <td>{{ k.franchise }}</td>

            <td>
                {% if k.logo_url %}
                    <img src="{{ k.logo_url.url }}" alt="logo" height="45">
                {% else %}
                    <span class="no-logo">No logo</span>
                {% endif %}
            </td>

            <td>
                <a href="{% url 'update_players' k.id %}" class="btn btn-update">
                    Update
                </a>
            </td>

            <td>
                <form method="POST" action="{% url 'delete_players' k.id %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-delete"
                        onclick="return confirm('⚠️ Are you sure you want to delete this player?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>

</body>
</html>
