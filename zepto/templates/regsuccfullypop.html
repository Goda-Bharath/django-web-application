
<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:white;
            font-family: Arial, sans-serif;
        }

        .success-box {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 25px #00f2ff;
            animation: fadeIn 0.8s ease;
        }

        .success-box h2 {
            color: #00ff99;
            margin-bottom: 20px;
        }

        .success-box p {
            color: #ccc;
            margin-bottom: 25px;
        }

        .btn {
            padding: 10px 20px;
            background: #00f2ff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #0ff;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tick animation */
        .tick {
            font-size: 50px;
            color: #00ff99;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
    </style>

</head>
<body>

<div class="success-box">
    <div class="tick">✔</div>
    <h2>Player Registered Successfully</h2>
    <p>Your data has been saved.</p>

    <a href="/register" class="btn">Go Back</a>
</div>

</body>
</html>
